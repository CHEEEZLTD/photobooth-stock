<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Stock — Photobooth</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --red: #ED2424; --red-dark: #c01c1c;
  --bg: #0c0c0c; --surface: #161616; --surface2: #1f1f1f;
  --border: #2c2c2c; --text: #f2f2f2; --muted: #6b6b6b;
  --green: #22c55e; --amber: #f59e0b;
  --font-head: 'Barlow Condensed', sans-serif;
  --font-body: 'DM Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 14px; min-height: 100vh; }

nav { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 28px; height: 58px; position: sticky; top: 0; z-index: 99; }
.nav-logo { font-family: var(--font-head); font-size: 22px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; color: var(--red); }
.nav-logo span { color: var(--text); }
.nav-links { display: flex; gap: 4px; }
.nav-link { font-family: var(--font-head); font-size: 15px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); text-decoration: none; padding: 8px 14px; border-radius: 6px; transition: all 0.15s; }
.nav-link:hover, .nav-link.active { color: var(--text); background: var(--surface2); }
.nav-link.active { color: var(--red); }
.conn-badge { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); padding: 4px 10px; background: var(--surface2); border-radius: 20px; }
.conn-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
.conn-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

.container { max-width: 1100px; margin: 0 auto; padding: 40px 28px; }

.page-title { font-family: var(--font-head); font-size: 42px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; line-height: 1; margin-bottom: 6px; }
.page-title span { color: var(--red); }
.page-sub { color: var(--muted); font-size: 13px; margin-bottom: 36px; }

/* ── STOCK GRID ── */
.stock-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 20px;
  margin-bottom: 40px;
}

.stock-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  animation: fadeUp 0.4s ease both;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.stock-card:nth-child(1){animation-delay:0.05s}
.stock-card:nth-child(2){animation-delay:0.1s}
.stock-card:nth-child(3){animation-delay:0.15s}
.stock-card:nth-child(4){animation-delay:0.2s}

.card-header {
  background: var(--surface2);
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.card-loc-id { font-family: var(--font-head); font-size: 26px; font-weight: 800; letter-spacing: 2px; color: var(--red); }
.card-loc-name { font-size: 12px; color: var(--muted); margin-top: 1px; }

.card-body { padding: 8px 0; }

.prod-row {
  display: flex;
  align-items: center;
  padding: 10px 18px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  gap: 10px;
}
.prod-row:last-child { border-bottom: none; }

.prod-info { flex: 1; }
.prod-name-row { font-size: 13px; font-weight: 500; }
.prod-icon-sm { margin-right: 6px; }

.qty-controls { display: flex; align-items: center; gap: 8px; }
.qty-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  width: 30px; height: 30px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 18px;
  font-family: var(--font-head);
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
}
.qty-btn:hover { border-color: var(--red); color: var(--red); }
.qty-btn.plus:hover { border-color: var(--green); color: var(--green); }

.qty-display {
  font-family: var(--font-head);
  font-size: 28px;
  font-weight: 700;
  min-width: 44px;
  text-align: center;
  transition: color 0.3s;
}
.qty-display.low { color: var(--amber); }
.qty-display.out { color: var(--red); }

.qty-input-wrap {
  display: none;
  align-items: center;
  gap: 6px;
}
.qty-input-wrap.show { display: flex; }
.qty-edit-input {
  background: var(--surface2);
  border: 1px solid var(--red);
  color: var(--text);
  font-family: var(--font-head);
  font-size: 22px;
  font-weight: 700;
  width: 70px;
  padding: 4px 8px;
  border-radius: 6px;
  text-align: center;
  outline: none;
}
.save-btn {
  background: var(--red);
  color: #fff;
  border: none;
  padding: 5px 10px;
  border-radius: 6px;
  font-family: var(--font-head);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 1px;
}
.cancel-btn {
  background: var(--surface2);
  color: var(--muted);
  border: 1px solid var(--border);
  padding: 5px 8px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
}

/* ── BULK ADJUST MODAL ── */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; align-items: center; justify-content: center; }
.modal-bg.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 32px; width: 90%; max-width: 460px; }
.modal-title { font-family: var(--font-head); font-size: 28px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--red); margin-bottom: 20px; }
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.form-select, .form-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 11px 14px;
  border-radius: 8px;
  font-family: var(--font-body);
  font-size: 14px;
  outline: none;
  transition: border 0.15s;
}
.form-select:focus, .form-input:focus { border-color: var(--red); }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
.btn { padding: 10px 18px; border-radius: 8px; cursor: pointer; font-family: var(--font-head); font-size: 15px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; border: none; transition: all 0.15s; }
.btn-primary { background: var(--red); color: #fff; }
.btn-primary:hover { background: var(--red-dark); }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--muted); }
.btn-outline:hover { border-color: var(--red); color: var(--text); }

/* ── ACTION ROW ── */
.action-row { display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; }

/* Toast */
.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--green); color: #000; font-family: var(--font-head); font-size: 16px; font-weight: 700; letter-spacing: 1px; padding: 12px 24px; border-radius: 8px; opacity: 0; transition: all 0.3s; z-index: 999; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.error { background: var(--red); color: #fff; }

::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: var(--bg); } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">Photo<span>booth</span></div>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Dashboard</a>
    <a href="sales.html" class="nav-link">Record Sale</a>
    <a href="inventory.html" class="nav-link active">Manage Stock</a>
  </div>
  <div class="conn-badge">
    <div class="conn-dot" id="conn-dot"></div>
    <span id="conn-label">Connecting…</span>
  </div>
</nav>

<div class="container">
  <div class="page-title">Manage <span>Stock</span></div>
  <div class="page-sub">Click ± to adjust by 1, or click the number to type a custom value.</div>

  <div class="action-row">
    <button class="btn btn-primary" onclick="openBulkModal()">+ Bulk Stock In</button>
    <button class="btn btn-outline" onclick="openTransferModal()">⇄ Transfer Between Locations</button>
  </div>

  <div id="stock-grid" class="stock-grid">
    <div style="color:var(--muted);padding:40px;text-align:center;grid-column:1/-1;">Loading…</div>
  </div>
</div>

<!-- Bulk Stock In Modal -->
<div class="modal-bg" id="modal-bulk">
  <div class="modal">
    <div class="modal-title">Stock In</div>
    <div class="form-group">
      <label class="form-label">Location</label>
      <select class="form-select" id="bulk-loc">
        <option value="LSQ">LSQ — Leicester Square</option>
        <option value="TCR">TCR — Tottenham Court Rd</option>
        <option value="CAM">CAM — Camden</option>
        <option value="OFFICE">Office</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Product</label>
      <select class="form-select" id="bulk-prod">
        <option value="film_camera">📷 Film Camera</option>
        <option value="digital_camera">📸 Digital Camera</option>
        <option value="sticker_01">🏷️ Sticker 01</option>
        <option value="sticker_02">🏷️ Sticker 02</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Quantity to Add</label>
      <input class="form-input" type="number" id="bulk-qty" min="1" value="1">
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('bulk')">Cancel</button>
      <button class="btn btn-primary" onclick="doBulkIn()">Add Stock</button>
    </div>
  </div>
</div>

<!-- Transfer Modal -->
<div class="modal-bg" id="modal-transfer">
  <div class="modal">
    <div class="modal-title">Transfer Stock</div>
    <div class="form-group">
      <label class="form-label">Product</label>
      <select class="form-select" id="tr-prod">
        <option value="film_camera">📷 Film Camera</option>
        <option value="digital_camera">📸 Digital Camera</option>
        <option value="sticker_01">🏷️ Sticker 01</option>
        <option value="sticker_02">🏷️ Sticker 02</option>
      </select>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div class="form-group">
        <label class="form-label">From</label>
        <select class="form-select" id="tr-from">
          <option value="LSQ">LSQ</option><option value="TCR">TCR</option>
          <option value="CAM">CAM</option><option value="OFFICE">Office</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">To</label>
        <select class="form-select" id="tr-to">
          <option value="TCR">TCR</option><option value="LSQ">LSQ</option>
          <option value="CAM">CAM</option><option value="OFFICE">Office</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Quantity</label>
      <input class="form-input" type="number" id="tr-qty" min="1" value="1">
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('transfer')">Cancel</button>
      <button class="btn btn-primary" onclick="doTransfer()">Transfer</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, runTransaction, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA_s0bIU7WYS7JPSsSuGgXx9xhlyYFoFko",
  authDomain: "cheeezstock.firebaseapp.com",
  databaseURL: "https://cheeezstock-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "cheeezstock",
  storageBucket: "cheeezstock.firebasestorage.app",
  messagingSenderId: "218543080764",
  appId: "1:218543080764:web:70ed03de545754d7cc4a39"
};

const LOCATIONS = [
  { id: 'LSQ', label: 'Leicester Square' },
  { id: 'TCR', label: 'Tottenham Court Rd' },
  { id: 'CAM', label: 'Camden' },
  { id: 'OFFICE', label: 'Office' },
];
const PRODUCTS = [
  { id: 'film_camera',    label: 'Film Camera',    icon: '📷' },
  { id: 'digital_camera', label: 'Digital Camera', icon: '📸' },
  { id: 'sticker_01',     label: 'Sticker 01',     icon: '🏷️' },
  { id: 'sticker_02',     label: 'Sticker 02',     icon: '🏷️' },
];
const LOW = 3;

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
let stock = {};

onValue(ref(db, '.info/connected'), snap => {
  const live = snap.val() === true;
  document.getElementById('conn-dot').className = 'conn-dot' + (live ? ' live' : '');
  document.getElementById('conn-label').textContent = live ? 'Live' : 'Offline';
});

onValue(ref(db, 'stock'), snap => {
  stock = snap.val() || {};
  renderGrid();
});

function renderGrid() {
  const grid = document.getElementById('stock-grid');
  grid.innerHTML = LOCATIONS.map(loc => {
    const rows = PRODUCTS.map(p => {
      const qty = (stock[loc.id] || {})[p.id] || 0;
      const cls = qty === 0 ? 'out' : qty <= LOW ? 'low' : '';
      return `<div class="prod-row">
        <div class="prod-info">
          <div class="prod-name-row"><span class="prod-icon-sm">${p.icon}</span>${p.label}</div>
        </div>
        <div class="qty-controls">
          <button class="qty-btn minus" onclick="adjust('${loc.id}','${p.id}',-1)">−</button>
          <div class="qty-display ${cls}" id="qty-${loc.id}-${p.id}"
            onclick="startEdit('${loc.id}','${p.id}')"
            title="Click to set custom value"
            style="cursor:pointer">${qty}</div>
          <div class="qty-input-wrap" id="edit-${loc.id}-${p.id}">
            <input class="qty-edit-input" type="number" min="0"
              onkeydown="if(event.key==='Enter') saveEdit('${loc.id}','${p.id}',this.value); if(event.key==='Escape') cancelEdit('${loc.id}','${p.id}')">
            <button class="save-btn" onclick="saveEdit('${loc.id}','${p.id}',this.previousElementSibling.value)">✓</button>
            <button class="cancel-btn" onclick="cancelEdit('${loc.id}','${p.id}')">✕</button>
          </div>
          <button class="qty-btn plus" onclick="adjust('${loc.id}','${p.id}',1)">+</button>
        </div>
      </div>`;
    }).join('');
    return `<div class="stock-card">
      <div class="card-header">
        <div>
          <div class="card-loc-id">${loc.id}</div>
          <div class="card-loc-name">${loc.label}</div>
        </div>
      </div>
      <div class="card-body">${rows}</div>
    </div>`;
  }).join('');
}

window.adjust = async (loc, prod, delta) => {
  await runTransaction(ref(db, `stock/${loc}/${prod}`), cur => {
    const next = (cur || 0) + delta;
    return next < 0 ? 0 : next;
  });
};

window.startEdit = (loc, prod) => {
  const display = document.getElementById(`qty-${loc}-${prod}`);
  const wrap = document.getElementById(`edit-${loc}-${prod}`);
  if (!display || !wrap) return;
  display.style.display = 'none';
  wrap.classList.add('show');
  const input = wrap.querySelector('input');
  input.value = (stock[loc] || {})[prod] || 0;
  input.focus();
  input.select();
};

window.cancelEdit = (loc, prod) => {
  document.getElementById(`qty-${loc}-${prod}`).style.display = '';
  document.getElementById(`edit-${loc}-${prod}`).classList.remove('show');
};

window.saveEdit = async (loc, prod, val) => {
  const qty = parseInt(val);
  if (isNaN(qty) || qty < 0) { showToast('Invalid quantity', true); return; }
  await runTransaction(ref(db, `stock/${loc}/${prod}`), () => qty);
  cancelEdit(loc, prod);
  showToast(`Updated ${prod.replace('_',' ')} at ${loc} → ${qty}`);
};

window.openBulkModal = () => document.getElementById('modal-bulk').classList.add('open');
window.openTransferModal = () => document.getElementById('modal-transfer').classList.add('open');
window.closeModal = (name) => document.getElementById('modal-' + name).classList.remove('open');

window.doBulkIn = async () => {
  const loc = document.getElementById('bulk-loc').value;
  const prod = document.getElementById('bulk-prod').value;
  const qty = parseInt(document.getElementById('bulk-qty').value) || 0;
  if (qty <= 0) { showToast('Enter a valid quantity', true); return; }
  await runTransaction(ref(db, `stock/${loc}/${prod}`), cur => (cur || 0) + qty);
  closeModal('bulk');
  showToast(`+${qty} ${prod.replace('_',' ')} added to ${loc}`);
};

window.doTransfer = async () => {
  const prod = document.getElementById('tr-prod').value;
  const from = document.getElementById('tr-from').value;
  const to = document.getElementById('tr-to').value;
  const qty = parseInt(document.getElementById('tr-qty').value) || 0;
  if (from === to) { showToast('From and To must be different', true); return; }
  const available = (stock[from] || {})[prod] || 0;
  if (available < qty) { showToast(`Not enough stock at ${from} (${available} available)`, true); return; }
  const updates = {};
  updates[`stock/${from}/${prod}`] = available - qty;
  updates[`stock/${to}/${prod}`] = ((stock[to] || {})[prod] || 0) + qty;
  await update(ref(db), updates);
  closeModal('transfer');
  showToast(`Transferred ${qty}x ${prod.replace('_',' ')} from ${from} → ${to}`);
};

function showToast(msg, error = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (error ? ' error' : '');
  setTimeout(() => t.className = 'toast', 3000);
}
</script>
</body>
</html>
