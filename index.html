<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photobooth — Stock Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --red: #ED2424;
  --red-dark: #c01c1c;
  --red-glow: rgba(237,36,36,0.18);
  --bg: #0c0c0c;
  --surface: #161616;
  --surface2: #1f1f1f;
  --border: #2c2c2c;
  --text: #f2f2f2;
  --muted: #6b6b6b;
  --green: #22c55e;
  --amber: #f59e0b;
  --font-head: 'Barlow Condensed', sans-serif;
  --font-body: 'DM Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  min-height: 100vh;
}

/* ── NAV ── */
nav {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  height: 58px;
  position: sticky;
  top: 0;
  z-index: 99;
}
.nav-logo {
  font-family: var(--font-head);
  font-size: 22px;
  font-weight: 800;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--red);
}
.nav-logo span { color: var(--text); }
.nav-links { display: flex; gap: 4px; }
.nav-link {
  font-family: var(--font-head);
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
  text-decoration: none;
  padding: 8px 14px;
  border-radius: 6px;
  transition: all 0.15s;
}
.nav-link:hover, .nav-link.active { color: var(--text); background: var(--surface2); }
.nav-link.active { color: var(--red); }
.nav-time {
  font-family: var(--font-head);
  font-size: 15px;
  letter-spacing: 2px;
  color: var(--muted);
}

/* ── LAYOUT ── */
.container { max-width: 1280px; margin: 0 auto; padding: 32px 28px; }

/* ── PAGE TITLE ── */
.page-title {
  font-family: var(--font-head);
  font-size: 42px;
  font-weight: 800;
  letter-spacing: 3px;
  text-transform: uppercase;
  line-height: 1;
  margin-bottom: 8px;
}
.page-title span { color: var(--red); }
.page-sub { color: var(--muted); font-size: 13px; margin-bottom: 36px; }

/* ── ALERT ── */
.alert {
  display: none;
  background: rgba(237,36,36,0.08);
  border: 1px solid rgba(237,36,36,0.3);
  border-left: 3px solid var(--red);
  border-radius: 8px;
  padding: 12px 16px;
  margin-bottom: 28px;
  font-size: 13px;
  color: #fca5a5;
}
.alert.show { display: flex; align-items: center; gap: 10px; }

/* ── LOCATION CARDS ── */
.loc-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px;
  margin-bottom: 40px;
}
.loc-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  transition: border-color 0.2s;
  animation: fadeUp 0.4s ease both;
}
.loc-card:hover { border-color: var(--red); }
@keyframes fadeUp {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}
.loc-card:nth-child(1) { animation-delay: 0.05s; }
.loc-card:nth-child(2) { animation-delay: 0.1s; }
.loc-card:nth-child(3) { animation-delay: 0.15s; }
.loc-card:nth-child(4) { animation-delay: 0.2s; }

.loc-header {
  background: var(--surface2);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.loc-id {
  font-family: var(--font-head);
  font-size: 28px;
  font-weight: 800;
  letter-spacing: 2px;
  color: var(--red);
}
.loc-name { font-size: 12px; color: var(--muted); margin-top: 1px; }
.loc-status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
}

.loc-body { padding: 16px 18px; }
.product-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.product-row:last-child { border-bottom: none; }
.product-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--muted);
}
.product-label .icon { font-size: 15px; }
.product-qty {
  font-family: var(--font-head);
  font-size: 26px;
  font-weight: 700;
  color: var(--text);
  transition: color 0.3s;
}
.product-qty.low { color: var(--amber); }
.product-qty.out { color: var(--red); }

.loc-footer {
  padding: 12px 18px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.loc-total { font-size: 12px; color: var(--muted); }
.loc-total-num {
  font-family: var(--font-head);
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
}
.btn-sale {
  background: var(--red);
  color: #fff;
  border: none;
  padding: 7px 14px;
  border-radius: 6px;
  font-family: var(--font-head);
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 1px;
  cursor: pointer;
  text-transform: uppercase;
  transition: background 0.15s, transform 0.1s;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.btn-sale:hover { background: var(--red-dark); transform: translateY(-1px); }

/* ── SUMMARY TABLE ── */
.section-title {
  font-family: var(--font-head);
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
}
.summary-table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 40px;
}
table { width: 100%; border-collapse: collapse; }
thead th {
  background: var(--surface2);
  padding: 12px 18px;
  text-align: left;
  font-family: var(--font-head);
  font-size: 12px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
}
thead th:not(:first-child) { text-align: center; }
tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--surface2); }
td { padding: 13px 18px; vertical-align: middle; }
td:not(:first-child) { text-align: center; }
.td-product {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 500;
}
.td-qty {
  font-family: var(--font-head);
  font-size: 22px;
  font-weight: 700;
}
.td-qty.low { color: var(--amber); }
.td-qty.out { color: var(--red); }
.td-total {
  font-family: var(--font-head);
  font-size: 22px;
  font-weight: 800;
  color: var(--red);
}

/* ── RECENT SALES ── */
.sales-list { display: flex; flex-direction: column; gap: 8px; }
.sale-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  animation: fadeUp 0.3s ease both;
}
.sale-loc {
  font-family: var(--font-head);
  font-size: 16px;
  font-weight: 700;
  color: var(--red);
  width: 48px;
  flex-shrink: 0;
}
.sale-product { flex: 1; font-size: 13px; }
.sale-qty {
  font-family: var(--font-head);
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
}
.sale-qty::before { content: '−'; color: var(--muted); margin-right: 2px; }
.sale-amount {
  font-family: var(--font-head);
  font-size: 16px;
  color: var(--green);
  width: 80px;
  text-align: right;
}
.sale-time { font-size: 11px; color: var(--muted); white-space: nowrap; }
.no-data { text-align: center; padding: 40px; color: var(--muted); }

/* ── LOADING ── */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 60px;
  font-family: var(--font-head);
  font-size: 18px;
  letter-spacing: 3px;
  color: var(--muted);
  text-transform: uppercase;
  gap: 12px;
}
.spinner {
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--red);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── CONNECTION STATUS ── */
.conn-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--muted);
  padding: 4px 10px;
  background: var(--surface2);
  border-radius: 20px;
}
.conn-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--muted);
}
.conn-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">Photo<span>booth</span></div>
  <div class="nav-links">
    <a href="index.html" class="nav-link active">Dashboard</a>
    <a href="sales.html" class="nav-link">Record Sale</a>
    <a href="inventory.html" class="nav-link">Manage Stock</a>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <div class="conn-badge">
      <div class="conn-dot" id="conn-dot"></div>
      <span id="conn-label">Connecting…</span>
    </div>
    <div class="nav-time" id="clock">--:--</div>
  </div>
</nav>

<div class="container">
  <div class="page-title">Stock <span>Dashboard</span></div>
  <div class="page-sub" id="last-updated">Loading real-time data…</div>

  <div class="alert" id="alert-box">
    <span>⚠️</span>
    <span id="alert-msg"></span>
  </div>

  <div id="loc-grid-wrap">
    <div class="loading"><div class="spinner"></div> Loading stock…</div>
  </div>

  <div class="section-title">Total Stock Overview</div>
  <div class="summary-table-wrap">
    <table>
      <thead>
        <tr>
          <th>Product</th>
          <th>LSQ</th><th>TCR</th><th>CAM</th><th>Office</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody id="summary-tbody">
        <tr><td colspan="6"><div class="loading" style="padding:24px;"><div class="spinner"></div></div></td></tr>
      </tbody>
    </table>
  </div>

  <div class="section-title">Recent Sales</div>
  <div id="recent-sales-wrap">
    <div class="loading"><div class="spinner"></div> Loading…</div>
  </div>
</div>

<!-- Firebase SDKs -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, get, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ── Load config ──────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyA_s0bIU7WYS7JPSsSuGgXx9xhlyYFoFko",
  authDomain: "cheeezstock.firebaseapp.com",
  databaseURL: "https://cheeezstock-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "cheeezstock",
  storageBucket: "cheeezstock.firebasestorage.app",
  messagingSenderId: "218543080764",
  appId: "1:218543080764:web:70ed03de545754d7cc4a39"
};

const LOCATIONS = [
  { id: 'LSQ', label: 'Leicester Square' },
  { id: 'TCR', label: 'Tottenham Court Rd' },
  { id: 'CAM', label: 'Camden' },
  { id: 'OFFICE', label: 'Office' },
];
const PRODUCTS = [
  { id: 'film_camera',    label: 'Film Camera',    icon: '📷' },
  { id: 'digital_camera', label: 'Digital Camera', icon: '📸' },
  { id: 'sticker_01',     label: 'Sticker 01',     icon: '🏷️' },
  { id: 'sticker_02',     label: 'Sticker 02',     icon: '🏷️' },
];
const LOW_THRESHOLD = 3;

// ── Init Firebase ────────────────────────────────────────────
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Seed stock if empty
async function seedIfEmpty() {
  const snap = await get(ref(db, 'stock'));
  if (!snap.exists()) {
    const init = {};
    LOCATIONS.forEach(l => {
      init[l.id] = {};
      PRODUCTS.forEach(p => { init[l.id][p.id] = 0; });
    });
    await set(ref(db, 'stock'), init);
  }
}
seedIfEmpty();

// ── Clock ────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
setInterval(updateClock, 1000);
updateClock();

// ── Connection status ────────────────────────────────────────
import { ref as dbRef, onDisconnect } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
const connRef = dbRef(db, '.info/connected');
onValue(connRef, snap => {
  const live = snap.val() === true;
  document.getElementById('conn-dot').className = 'conn-dot' + (live ? ' live' : '');
  document.getElementById('conn-label').textContent = live ? 'Live' : 'Offline';
});

// ── Stock listener ───────────────────────────────────────────
onValue(ref(db, 'stock'), snap => {
  const stock = snap.val() || {};
  document.getElementById('last-updated').textContent =
    'Last updated: ' + new Date().toLocaleTimeString('en-GB');
  renderLocCards(stock);
  renderSummary(stock);
  checkAlerts(stock);
});

// ── Sales listener ───────────────────────────────────────────
onValue(ref(db, 'sales'), snap => {
  const sales = snap.val() ? Object.values(snap.val()) : [];
  sales.sort((a,b) => b.timestamp - a.timestamp);
  renderRecentSales(sales.slice(0, 15));
});

// ── RENDER: Location cards ───────────────────────────────────
function renderLocCards(stock) {
  const wrap = document.getElementById('loc-grid-wrap');
  wrap.innerHTML = '<div class="loc-grid">' +
    LOCATIONS.map(loc => {
      const locStock = stock[loc.id] || {};
      const total = PRODUCTS.reduce((s, p) => s + (locStock[p.id] || 0), 0);
      const rows = PRODUCTS.map(p => {
        const qty = locStock[p.id] || 0;
        const cls = qty === 0 ? 'out' : qty <= LOW_THRESHOLD ? 'low' : '';
        return `<div class="product-row">
          <div class="product-label"><span class="icon">${p.icon}</span>${p.label}</div>
          <div class="product-qty ${cls}">${qty}</div>
        </div>`;
      }).join('');
      return `<div class="loc-card">
        <div class="loc-header">
          <div>
            <div class="loc-id">${loc.id}</div>
            <div class="loc-name">${loc.label}</div>
          </div>
          <div class="loc-status-dot"></div>
        </div>
        <div class="loc-body">${rows}</div>
        <div class="loc-footer">
          <div class="loc-total">Total units: <span class="loc-total-num">${total}</span></div>
          ${loc.id !== 'OFFICE' ? `<a href="sales.html?loc=${loc.id}" class="btn-sale">+ Sale</a>` : ''}
        </div>
      </div>`;
    }).join('') + '</div>';
}

// ── RENDER: Summary table ────────────────────────────────────
function renderSummary(stock) {
  const tbody = document.getElementById('summary-tbody');
  tbody.innerHTML = PRODUCTS.map(p => {
    const cols = LOCATIONS.map(loc => {
      const qty = (stock[loc.id] || {})[p.id] || 0;
      const cls = qty === 0 ? 'out' : qty <= LOW_THRESHOLD ? 'low' : '';
      return `<td><span class="td-qty ${cls}">${qty}</span></td>`;
    }).join('');
    const total = LOCATIONS.reduce((s, loc) => s + ((stock[loc.id] || {})[p.id] || 0), 0);
    return `<tr>
      <td><div class="td-product"><span>${p.icon}</span>${p.label}</div></td>
      ${cols}
      <td><span class="td-total">${total}</span></td>
    </tr>`;
  }).join('');
}

// ── RENDER: Recent sales ─────────────────────────────────────
function renderRecentSales(sales) {
  const wrap = document.getElementById('recent-sales-wrap');
  if (!sales.length) {
    wrap.innerHTML = '<div class="no-data">No sales recorded yet.</div>';
    return;
  }
  const items = sales.map(s => {
    const prod = PRODUCTS.find(p => p.id === s.product) || {};
    const time = new Date(s.timestamp).toLocaleString('en-GB', {
      day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'
    });
    const amt = s.amount ? `£${Number(s.amount).toFixed(2)}` : '—';
    return `<div class="sale-item">
      <div class="sale-loc">${s.location}</div>
      <div class="sale-product">${prod.icon || ''} ${prod.label || s.product}</div>
      <div class="sale-qty">${s.qty}</div>
      <div class="sale-amount">${amt}</div>
      <div class="sale-time">${time}</div>
    </div>`;
  }).join('');
  wrap.innerHTML = '<div class="sales-list">' + items + '</div>';
}

// ── Alerts ───────────────────────────────────────────────────
function checkAlerts(stock) {
  const issues = [];
  LOCATIONS.forEach(loc => {
    PRODUCTS.forEach(p => {
      const qty = (stock[loc.id] || {})[p.id] || 0;
      if (qty === 0) issues.push(`${p.label} at ${loc.id} is OUT OF STOCK`);
      else if (qty <= LOW_THRESHOLD) issues.push(`${p.label} at ${loc.id} is low (${qty})`);
    });
  });
  const box = document.getElementById('alert-box');
  if (issues.length) {
    document.getElementById('alert-msg').textContent = issues.join(' · ');
    box.classList.add('show');
  } else {
    box.classList.remove('show');
  }
}
</script>
</body>
</html>
